bundle:
  name: shopstream-databricks-data-platform

# ---------------------------------------------------------------------------
# Variables
# ---------------------------------------------------------------------------
variables:
  DATABRICKS_HOST:
    description: Databricks workspace URL (e.g. https://adb-xxx.azuredatabricks.net)
    default: https://adb-7405604860980699.19.azuredatabricks.net
  STORAGE_ACCOUNT:
    description: ADLS Gen2 storage account name
    default: helixdataadls
  ALERT_EMAIL:
    description: Email for job failure alerts
    default: team@shopstream.example
  LAKEFLOW_GATEWAY_ID:
    description: Lakeflow Connect gateway ID (created in workspace UI)
    default: temp-gateway-id

# ---------------------------------------------------------------------------
# Target — single prod environment
# Wife deploys here during Phase 02. Ketan copies the finished code into
# helix-ai-platform after Phase 02 is complete.
# ---------------------------------------------------------------------------
targets:
  prod:
    mode: production
    workspace:
      # Keep this literal for CLI compatibility. Variable interpolation is not
      # supported in workspace.host by the current Databricks CLI.
      host: https://adb-7405604860980699.19.azuredatabricks.net
      root_path: /Workspace/Users/vaishnavi.sahu.nl@gmail.com/.bundle/${bundle.name}/${bundle.target}

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:

  pipelines:

    # NOTE: customers_lakeflow and products_lakeflow require a real PostgreSQL
    # UC connection (shopstream_postgres). In this lab environment, customers
    # and products data is CSV-based (generated by data_generators/) and
    # ingested via Auto Loader in ingest_customers_batch.py / ingest_products_batch.py.
    # Those two Lakeflow Connect pipelines are excluded from this bundle target.

    # DLT streaming pipeline — ONLY ingest_orders_streaming.py uses @dlt.table.
    # Silver/gold are regular Spark notebook tasks in the nightly_batch job below.
    streaming_pipeline:
      name: helix_streaming_pipeline
      continuous: true
      serverless: true
      catalog: helix_bronze
      target: orders
      libraries:
        - notebook:
            path: data_platform/pipelines/bronze/ingest_orders_streaming.py

  jobs:

    # Nightly batch — runs as sequential Databricks Job notebook tasks.
    # No DLT here: plain Spark notebooks; spark is injected automatically.
    # Execution order: bronze → silver dims (parallel) → silver facts → gold
    # No job_clusters block: workspace is serverless-only, cluster is auto-provisioned.
    nightly_batch:
      name: helix_nightly_batch
      schedule:
        quartz_cron_expression: "0 0 1 * * ?"
        timezone_id: "UTC"
        pause_status: PAUSED  # data in gold layer — re-enable when refreshing for ML training
      tasks:
        # --- Bronze ingestion (parallel, no dependencies) ---
        - task_key: ingest_customers
          notebook_task:
            notebook_path: ${workspace.root_path}/files/data_platform/pipelines/bronze/ingest_customers_batch

        - task_key: ingest_products
          notebook_task:
            notebook_path: ${workspace.root_path}/files/data_platform/pipelines/bronze/ingest_products_batch

        - task_key: ingest_returns
          notebook_task:
            notebook_path: ${workspace.root_path}/files/data_platform/pipelines/bronze/ingest_returns_autoloader

        # --- Silver dims (depend on their bronze sources) ---
        - task_key: dim_customers
          depends_on:
            - task_key: ingest_customers
          notebook_task:
            notebook_path: ${workspace.root_path}/files/data_platform/pipelines/silver/dim_customers_scd2

        - task_key: dim_products
          depends_on:
            - task_key: ingest_products
          notebook_task:
            notebook_path: ${workspace.root_path}/files/data_platform/pipelines/silver/dim_products_scd1

        - task_key: dim_regions
          notebook_task:
            notebook_path: ${workspace.root_path}/files/data_platform/pipelines/silver/dim_regions_truncate_load

        # --- Silver facts (depend on dims) ---
        - task_key: fct_orders
          depends_on:
            - task_key: dim_customers
            - task_key: dim_products
            - task_key: dim_regions
          notebook_task:
            notebook_path: ${workspace.root_path}/files/data_platform/pipelines/silver/fct_orders

        - task_key: fct_returns
          depends_on:
            - task_key: ingest_returns
            - task_key: fct_orders
          notebook_task:
            notebook_path: ${workspace.root_path}/files/data_platform/pipelines/silver/fct_returns

        # --- Gold aggregations (depend on silver) ---
        - task_key: customer_metrics
          depends_on:
            - task_key: fct_returns
          notebook_task:
            notebook_path: ${workspace.root_path}/files/data_platform/pipelines/gold/customer_metrics

        - task_key: product_performance
          depends_on:
            - task_key: fct_returns
          notebook_task:
            notebook_path: ${workspace.root_path}/files/data_platform/pipelines/gold/product_performance

        - task_key: revenue_daily
          depends_on:
            - task_key: fct_returns
          notebook_task:
            notebook_path: ${workspace.root_path}/files/data_platform/pipelines/gold/revenue_daily

      email_notifications:
        on_failure:
          - ${var.ALERT_EMAIL}

    delta_maintenance:
      name: helix_delta_maintenance
      schedule:
        quartz_cron_expression: "0 0 3 ? * SUN"
        timezone_id: "UTC"
      tasks:
        - task_key: optimize_vacuum
          notebook_task:
            notebook_path: /data_platform/notebooks/delta_optimize
