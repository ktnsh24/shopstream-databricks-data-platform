bundle:
  name: shopstream-databricks-data-platform

# ---------------------------------------------------------------------------
# Variables
# ---------------------------------------------------------------------------
variables:
  DATABRICKS_HOST:
    description: Databricks workspace URL (e.g. https://adb-xxx.azuredatabricks.net)
    default: https://adb-7405604860980699.19.azuredatabricks.net
  STORAGE_ACCOUNT:
    description: ADLS Gen2 storage account name
    default: helixdataadls
  ALERT_EMAIL:
    description: Email for job failure alerts
    default: team@shopstream.example
  LAKEFLOW_GATEWAY_ID:
    description: Lakeflow Connect gateway ID (created in workspace UI)
    default: temp-gateway-id

# ---------------------------------------------------------------------------
# Target — single prod environment
# Wife deploys here during Phase 02. Ketan copies the finished code into
# helix-ai-platform after Phase 02 is complete.
# ---------------------------------------------------------------------------
targets:
  prod:
    mode: production
    workspace:
      # Keep this literal for CLI compatibility. Variable interpolation is not
      # supported in workspace.host by the current Databricks CLI.
      host: https://adb-7405604860980699.19.azuredatabricks.net
      root_path: /Workspace/Users/vaishnavi.sahu.nl@gmail.com/.bundle/${bundle.name}/${bundle.target}

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:

  pipelines:

    # NOTE: customers_lakeflow and products_lakeflow require a real PostgreSQL
    # UC connection (shopstream_postgres). In this lab environment, customers
    # and products data is CSV-based (generated by data_generators/) and
    # ingested via Auto Loader in ingest_customers_batch.py / ingest_products_batch.py.
    # Those two Lakeflow Connect pipelines are excluded from this bundle target.

    # Lakeflow SDP — Bronze orders streaming + Silver + Gold (continuous)
    streaming_pipeline:
      name: helix_streaming_pipeline
      continuous: true
      serverless: true
      catalog: helix_bronze
      target: orders
      libraries:
        - notebook:
            path: data_platform/pipelines/bronze/ingest_orders_streaming
        - notebook:
            path: data_platform/pipelines/silver/fct_orders
        - notebook:
            path: data_platform/pipelines/gold/revenue_daily

    # Lakeflow SDP — Nightly batch: Bronze returns + Silver dims + Gold aggregations
    nightly_batch_pipeline:
      name: helix_nightly_batch_pipeline
      serverless: true
      catalog: helix_bronze
      target: batch
      libraries:
        - notebook:
            path: data_platform/pipelines/bronze/ingest_customers_batch
        - notebook:
            path: data_platform/pipelines/bronze/ingest_products_batch
        - notebook:
            path: data_platform/pipelines/bronze/ingest_returns_autoloader
        - notebook:
            path: data_platform/pipelines/silver/dim_customers_scd2
        - notebook:
            path: data_platform/pipelines/silver/dim_products_scd1
        - notebook:
            path: data_platform/pipelines/silver/dim_regions_truncate_load
        - notebook:
            path: data_platform/pipelines/silver/fct_returns
        - notebook:
            path: data_platform/pipelines/gold/customer_metrics
        - notebook:
            path: data_platform/pipelines/gold/product_performance

  jobs:

    nightly_batch:
      name: helix_nightly_batch
      schedule:
        quartz_cron_expression: "0 0 1 * * ?"
        timezone_id: "UTC"
      tasks:
        - task_key: nightly_batch_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.nightly_batch_pipeline.id}
      email_notifications:
        on_failure:
          - ${var.ALERT_EMAIL}

    delta_maintenance:
      name: helix_delta_maintenance
      schedule:
        quartz_cron_expression: "0 0 3 ? * SUN"
        timezone_id: "UTC"
      tasks:
        - task_key: optimize_vacuum
          notebook_task:
            notebook_path: /data_platform/notebooks/delta_optimize
